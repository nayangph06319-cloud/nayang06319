<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ติดตั้งระบบ V12</title><script src="cms-config.js"></script><style>
body{margin:0;font-family:system-ui,"Segoe UI",sans-serif;background:linear-gradient(135deg,#eaf6ff,#fff);color:#111827}.wrap{width:min(960px,calc(100% - 28px));margin:auto;padding:38px 0}.card{background:#fff;border:1px solid #dbe4ee;border-radius:22px;box-shadow:0 14px 34px rgba(0,0,0,.12);padding:26px;margin-bottom:18px}h1{margin:0;color:#07569b}.lead{color:#6b7280}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{font-weight:800}input{width:100%;padding:13px 15px;border:1px solid #dbe4ee;border-radius:14px;font:inherit}button{border:0;border-radius:14px;padding:13px 18px;font-weight:900;cursor:pointer;background:#0b74d1;color:white;box-shadow:0 10px 26px rgba(0,0,0,.1)}.success{background:#06c755}.danger{background:#dc2626}.note{background:#f0fdf4;color:#065f46;padding:12px;border-radius:14px;margin-top:12px}.err{background:#fef2f2;color:#991b1b;padding:12px;border-radius:14px;margin-top:12px}.full{grid-column:1/-1}@media(max-width:720px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="card"><h1>ติดตั้งระบบเว็บไซต์ รพ.สต.นายาง V12</h1><p class="lead">กรอกครั้งเดียว หลังจากนี้จัดการทุกอย่างผ่านหลังบ้าน ไม่ต้องแก้โค้ดอีก</p></div>
<div class="card"><h2>1) ตั้งค่า Web App URL</h2><label>Web App URL ที่ลงท้าย /exec</label><input id="webUrl" placeholder="https://script.google.com/macros/s/....../exec"><br><br><button onclick="saveWebUrl()">บันทึก URL</button> <button class="danger" onclick="localStorage.removeItem('NAYANG_WEB_APP_URL');location.reload()">ล้างค่า</button><div id="webMsg"></div></div>
<div class="card"><h2>2) เชื่อม Google Sheet และ Drive</h2><div class="grid"><div class="full"><label>Google Sheet URL หรือ Spreadsheet ID</label><input id="sheetUrl" placeholder="วาง URL Google Sheet"></div><div class="full"><label>Google Drive Folder URL หรือ Folder ID</label><input id="folderUrl" placeholder="วาง URL โฟลเดอร์เก็บรูป/เอกสาร"></div><div><label>ตั้งรหัสผ่าน Admin ใหม่</label><input id="adminPass" type="password" placeholder="เช่น nayang2026"></div><div><label>รหัสผ่านเดิม ถ้าเคยติดตั้งแล้ว</label><input id="oldPass" type="password" placeholder="เว้นว่างได้ถ้ายังไม่เคยติดตั้ง"></div></div><br><button class="success" onclick="install()">ติดตั้งระบบ</button> <button onclick="testApi()">ทดสอบ API</button><div id="setupMsg"></div></div>
<div class="card"><h2>3) เปิดใช้งาน</h2><button onclick="location.href='admin.html'">เปิดระบบหลังบ้าน</button> <button onclick="location.href='index.html'">เปิดหน้าเว็บไซต์</button></div></div>
<script>
const API=()=>localStorage.getItem('NAYANG_WEB_APP_URL')||(window.NAYANG_CMS&&window.NAYANG_CMS.WEB_APP_URL)||'';document.getElementById('webUrl').value=API();
function box(id,t,ok=true){document.getElementById(id).innerHTML='<div class="'+(ok?'note':'err')+'">'+t+'</div>'}
function saveWebUrl(){const u=document.getElementById('webUrl').value.trim();if(!u){box('webMsg','กรุณาวาง Web App URL',false);return}localStorage.setItem('NAYANG_WEB_APP_URL',u);box('webMsg','บันทึก URL แล้ว')}
async function post(action,data={}){const u=API();if(!u)throw new Error('ยังไม่ได้ตั้งค่า Web App URL');const r=await fetch(u,{method:'POST',body:JSON.stringify({action,...data})});const j=await r.json();if(!j.ok)throw new Error(j.message||'ไม่สำเร็จ');return j}
async function install(){try{saveWebUrl();await post('setup',{spreadsheetUrl:sheetUrl.value.trim(),folderUrl:folderUrl.value.trim(),adminPassword:adminPass.value.trim(),password:oldPass.value.trim(),setupKey:oldPass.value.trim()});box('setupMsg','ติดตั้งสำเร็จ เปิดหลังบ้านได้เลย')}catch(e){box('setupMsg',e.message,false)}}
async function testApi(){try{const t=await fetch(API()+'?callback=test').then(r=>r.text());box('setupMsg','เชื่อมต่อได้: '+t.slice(0,120)+'...')}catch(e){box('setupMsg',e.message,false)}}
</script></body></html>
